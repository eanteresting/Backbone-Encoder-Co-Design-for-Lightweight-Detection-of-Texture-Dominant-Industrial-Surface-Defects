DEIM:
  backbone: HGNetv2
  encoder: HybridEncoderV2
  decoder: DEIMV2Transformer

HGNetv2:
  name: 'B0'
  return_idx: [2, 3]
  freeze_at: -1
  freeze_norm: False
  use_lab: True

HybridEncoderV2:
  distill_teacher_dim: 768
  in_channels: [512, 1024]
  feat_strides: [16, 32]

  # intra
  hidden_dim: 128
  use_encoder_idx: [1]
  dim_feedforward: 512

  # cross
  expansion: 0.34
  depth_mult: 0.5

  version: 'deim'

DEIMV2Transformer:
  feat_channels: [128, 128]
  feat_strides: [16, 32]
  hidden_dim: 128
  num_levels: 2
  num_points: [6, 6]

  num_layers: 3
  eval_idx: -1

  # FFN
  dim_feedforward: 512

optimizer:
  type: AdamW
  params:
    -
      params: '^(?=.*backbone)(?!.*norm|bn).*$'
      lr: 0.0004
    -
      params: '^(?=.*backbone)(?=.*norm|bn).*$'
      lr: 0.0004
      weight_decay: 0.
    -
      params: '^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$'
      weight_decay: 0.

  lr: 0.0008
  betas: [0.9, 0.999]
  weight_decay: 0.0001

# Increase to search for the optimal ema
epoches: 220
## Our LR-Scheduler
flat_epoch: 108
no_aug_epoch: 12
lr_gamma: 0.75

## Our DataAug
train_dataloader:
  total_batch_size: 4
  dataset: 
    transforms:
      policy:
        epoch: [4, 108, 208]   # list

  collate_fn:
    ema_restart_decay: 0.9999
    base_size_repeat: ~

    mixup_epochs: [4, 108]
    stop_epoch: 208
    copyblend_prob: 0.4
    copyblend_epochs: [4, 208]   # CP half

    area_threshold: 100
    num_objects: 3
    with_expand: True
    expand_ratios: [0.1, 0.25]

DEIMCriterion:
  weight_dict:
    loss_distill: 10
  distill_adaptive_params:
    enabled: True
    rho: 5.0
    delta: 1.3
    default_weight: 10

  matcher:
    # new matcher
    change_matcher: True
    iou_order_alpha: 4.0
    matcher_change_epoch: 128

val_dataloader:
  total_batch_size: 4